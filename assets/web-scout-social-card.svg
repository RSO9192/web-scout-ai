<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">web-scout-ai social card</title>
  <desc id="desc">Social preview card — terminal frame with sigil panel and product wordmark.</desc>
  <defs>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#090909"/>

  <!-- Terminal frame -->
  <rect x="12" y="12" width="1256" height="616" rx="20" fill="#0d0d0d" stroke="#4ade80" stroke-width="1.5" opacity="0.28"/>

  <!-- Title bar -->
  <rect x="12" y="12" width="1256" height="46" rx="18" fill="#4ade80" opacity="0.05"/>
  <line x1="12" y1="58" x2="1268" y2="58" stroke="#4ade80" stroke-width="0.8" opacity="0.15"/>

  <!-- Traffic lights -->
  <circle cx="42" cy="35" r="8" fill="#4ade80" opacity="0.55"/>
  <circle cx="66" cy="35" r="8" fill="#4ade80" opacity="0.28"/>
  <circle cx="90" cy="35" r="8" fill="#4ade80" opacity="0.14"/>

  <!-- Title bar label -->
  <text x="640" y="41" fill="#4ade80" font-size="13"
        font-family="'Courier New', Courier, monospace"
        text-anchor="middle" opacity="0.30">web-scout-ai — scout</text>

  <!-- Left: sigil panel -->
  <rect x="60" y="108" width="384" height="424" rx="18"
        fill="#111111" stroke="#4ade80" stroke-width="1" opacity="0.18"/>
  <g transform="translate(90,148)" filter="url(#glow)">
    <!-- W -->
    <path d="M30 28 L88 272 L172 142 L256 272 L314 28"
          fill="none" stroke="url(#sig)" stroke-width="18"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Magnifier -->
    <circle cx="172" cy="246" r="90"
            fill="none" stroke="url(#sig)" stroke-width="13" opacity="0.8"/>
    <!-- Handle -->
    <line x1="236" y1="310" x2="292" y2="366"
          stroke="url(#sig)" stroke-linecap="round" stroke-width="19"/>
  </g>

  <!-- Right: text block -->
  <text x="510" y="224" fill="#e8fdf4" font-size="76"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" letter-spacing="1">web-scout-ai</text>

  <!-- Separator -->
  <line x1="512" y1="252" x2="1230" y2="252" stroke="#4ade80" stroke-width="1.2" opacity="0.2"/>

  <!-- Tagline -->
  <text x="510" y="300" fill="#4ade80" font-size="28"
        font-family="'Courier New', Courier, monospace"
        opacity="0.78">search → scrape → synthesize</text>

  <!-- Description -->
  <text x="510" y="368" fill="#94a3b8" font-size="22"
        font-family="'Courier New', Courier, monospace"
        opacity="0.65">The missing middle ground between search</text>
  <text x="510" y="400" fill="#94a3b8" font-size="22"
        font-family="'Courier New', Courier, monospace"
        opacity="0.65">APIs and deep research agents.</text>

  <!-- pip install prompt -->
  <text x="510" y="490" fill="#4ade80" font-size="20"
        font-family="'Courier New', Courier, monospace"
        opacity="0.42">$ pip install web-scout-ai</text>

  <!-- Cursor -->
  <rect x="510" y="502" width="10" height="16" rx="1" fill="#4ade80" opacity="0.55"/>
</svg>
