<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">web-scout-ai social card</title>
  <desc id="desc">Social preview card with logo mark, product name, and short tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091224"/>
      <stop offset="100%" stop-color="#1b4965"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28c2ff"/>
      <stop offset="100%" stop-color="#00d1b2"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#fb8500"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#05101d" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1150" cy="90" r="180" fill="#3db7de" opacity="0.07"/>
  <circle cx="180" cy="560" r="240" fill="#00d1b2" opacity="0.08"/>

  <g transform="translate(70,92)" filter="url(#shadow)">
    <rect x="0" y="0" width="440" height="440" rx="98" fill="#0f1a32" stroke="#2f6f92" stroke-width="4"/>

    <g transform="translate(57,57)">
      <circle cx="162" cy="162" r="120" fill="none" stroke="url(#line)" stroke-width="20"/>
      <ellipse cx="162" cy="162" rx="46" ry="120" fill="none" stroke="#5eead4" stroke-width="10" opacity="0.9"/>
      <ellipse cx="162" cy="162" rx="120" ry="50" fill="none" stroke="#5eead4" stroke-width="10" opacity="0.84"/>
      <path d="M42 162h240M162 42v240" stroke="#86efac" stroke-width="8" opacity="0.78"/>

      <circle cx="238" cy="238" r="52" fill="none" stroke="url(#lens)" stroke-width="15"/>
      <path d="M275 275l68 68" stroke="url(#lens)" stroke-linecap="round" stroke-width="20"/>

      <g transform="translate(220,56)">
        <rect x="0" y="0" width="76" height="96" rx="10" fill="#e2f3ff" opacity="0.96"/>
        <path d="M56 0v20h20" fill="#b4dcf7"/>
        <path d="M14 34h48M14 48h36M14 62h44" stroke="#1b4965" stroke-width="6" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <g transform="translate(560,170)">
    <text x="0" y="120" fill="#eef8ff" font-size="86" font-family="Avenir Next, Segoe UI, Trebuchet MS, sans-serif" font-weight="700">web-scout-ai</text>
    <rect x="2" y="150" width="620" height="4" fill="#2bb6e6" opacity="0.55"/>
    <text x="0" y="222" fill="#9bd1eb" font-size="36" font-family="Avenir Next, Segoe UI, Trebuchet MS, sans-serif" font-weight="500">Search smarter. Scrape deeper. Synthesize faster.</text>
    <text x="0" y="286" fill="#d4e8f5" font-size="29" font-family="Avenir Next, Segoe UI, Trebuchet MS, sans-serif" font-weight="400">The missing middle ground between search APIs and deep research agents.</text>
