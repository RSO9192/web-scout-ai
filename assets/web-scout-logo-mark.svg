<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">web-scout-ai logo mark</title>
  <desc id="desc">Terminal-frame icon with W-and-magnifier sigil in green-to-cyan gradient.</desc>
  <defs>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#0d0d0d"/>

  <!-- Terminal frame -->
  <rect x="40" y="40" width="944" height="944" rx="160" fill="#0d0d0d" stroke="#4ade80" stroke-width="6" opacity="0.28"/>

  <!-- Title bar (rx="0" — outer frame provides the corner rounding) -->
  <rect x="40" y="40" width="944" height="110" rx="0" fill="#4ade80" opacity="0.05"/>
  <line x1="40" y1="150" x2="984" y2="150" stroke="#4ade80" stroke-width="2.5" opacity="0.15"/>

  <!-- Traffic lights -->
  <circle cx="110" cy="95" r="22" fill="#4ade80" opacity="0.55"/>
  <circle cx="172" cy="95" r="22" fill="#4ade80" opacity="0.28"/>
  <circle cx="234" cy="95" r="22" fill="#4ade80" opacity="0.14"/>

  <!-- Sigil (centered in content area below title bar) -->
  <g transform="translate(172,210)" filter="url(#glow)">
    <!-- W stroke -->
    <path d="M60 60 L168 560 L340 280 L512 560 L620 60"
          fill="none" stroke="url(#sig)" stroke-width="38"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Magnifier circle -->
    <circle cx="340" cy="490" r="180"
            fill="none" stroke="url(#sig)" stroke-width="26" opacity="0.8"/>
    <!-- Handle -->
    <line x1="467" y1="617" x2="583" y2="733"
          stroke="url(#sig)" stroke-linecap="round" stroke-width="38"/>
  </g>
</svg>
