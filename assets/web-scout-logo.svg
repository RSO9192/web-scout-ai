<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">web-scout-ai logo</title>
  <desc id="desc">Stylized globe, magnifier, and document mark with web-scout-ai wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1b4965"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28c2ff"/>
      <stop offset="100%" stop-color="#00d1b2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#fb8500"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#06101f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="1184" height="304" rx="34" fill="url(#bg)"/>

  <g transform="translate(48,40)" filter="url(#softShadow)">
    <rect x="0" y="0" width="246" height="240" rx="30" fill="#0f1a32" stroke="#2f6f92" stroke-width="2"/>

    <g transform="translate(28,28)">
      <circle cx="92" cy="86" r="64" fill="none" stroke="url(#mark)" stroke-width="11"/>
      <ellipse cx="92" cy="86" rx="22" ry="64" fill="none" stroke="#5eead4" stroke-width="6" opacity="0.9"/>
      <ellipse cx="92" cy="86" rx="64" ry="25" fill="none" stroke="#5eead4" stroke-width="6" opacity="0.85"/>
      <path d="M30 86h124M92 24v124" stroke="#86efac" stroke-width="4" opacity="0.8"/>

      <circle cx="132" cy="126" r="28" fill="none" stroke="url(#accent)" stroke-width="9"/>
      <path d="M151 145l29 29" stroke="url(#accent)" stroke-linecap="round" stroke-width="11"/>

      <g transform="translate(118,26)">
        <rect x="0" y="0" width="44" height="54" rx="7" fill="#e2f3ff" opacity="0.95"/>
        <path d="M33 0v13h11" fill="#b4dcf7"/>
        <path d="M8 19h26M8 28h20M8 37h24" stroke="#1b4965" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <g transform="translate(330,70)">
    <text x="0" y="95" fill="#eef8ff" font-size="82" font-family="Avenir Next, Segoe UI, Trebuchet MS, sans-serif" font-weight="700" letter-spacing="0.5">web-scout-ai</text>
    <rect x="0" y="118" width="570" height="3" fill="#2bb6e6" opacity="0.55"/>
    <text x="0" y="168" fill="#8cc9e8" font-size="30" font-family="Avenir Next, Segoe UI, Trebuchet MS, sans-serif" font-weight="500">
      Search smarter. Scrape deeper. Synthesize faster.
    </text>
  </g>
</svg>
