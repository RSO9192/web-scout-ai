<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">web-scout-ai logo</title>
  <desc id="desc">Terminal-frame banner with W-and-magnifier sigil and web-scout-ai wordmark.</desc>
  <defs>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="#090909"/>

  <!-- Terminal frame -->
  <rect x="10" y="10" width="1180" height="300" rx="18" fill="#0d0d0d" stroke="#4ade80" stroke-width="1.5" opacity="0.28"/>

  <!-- Title bar -->
  <rect x="10" y="10" width="1180" height="38" rx="16" fill="#4ade80" opacity="0.06"/>
  <line x1="10" y1="48" x2="1190" y2="48" stroke="#4ade80" stroke-width="0.8" opacity="0.18"/>

  <!-- Traffic lights -->
  <circle cx="36" cy="29" r="7" fill="#4ade80" opacity="0.55"/>
  <circle cx="60" cy="29" r="7" fill="#4ade80" opacity="0.28"/>
  <circle cx="84" cy="29" r="7" fill="#4ade80" opacity="0.14"/>

  <!-- Title bar label -->
  <text x="600" y="34" fill="#4ade80" font-size="13"
        font-family="'Courier New', Courier, monospace"
        text-anchor="middle" opacity="0.32">web-scout-ai — scout</text>

  <!-- Sigil -->
  <g transform="translate(52,62)" filter="url(#glow)">
    <!-- W: reference M25 40 scaled ~x4.1 -->
    <path d="M16 28 L52 160 L96 84 L138 160 L174 28"
          fill="none" stroke="url(#sig)" stroke-width="10"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Magnifier: reference cx70 cy88 r28 scaled ~x1.8 -->
    <circle cx="96" cy="140" r="52"
            fill="none" stroke="url(#sig)" stroke-width="7" opacity="0.8"/>
    <!-- Handle -->
    <line x1="130" y1="175" x2="164" y2="209"
          stroke="url(#sig)" stroke-linecap="round" stroke-width="10"/>
  </g>

  <!-- Wordmark -->
  <text x="292" y="170" fill="#e8fdf4" font-size="88"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" letter-spacing="2">web-scout-ai</text>

  <!-- Tagline -->
  <text x="294" y="222" fill="#4ade80" font-size="26"
        font-family="'Courier New', Courier, monospace"
        opacity="0.72">search → scrape → synthesize</text>

  <!-- Cursor -->
  <rect x="294" y="238" width="14" height="20" rx="2" fill="#4ade80" opacity="0.65"/>
</svg>
